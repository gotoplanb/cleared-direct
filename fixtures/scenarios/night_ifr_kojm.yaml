title: "Night IFR into KOJM"
description: "Routine IFR flight with deteriorating conditions on arrival"
aircraft: single-engine
departure: KGNV
destination: KOJM
route:
  - KGNV
  - MERIT
  - DRBIE
  - KOJM
difficulty_baseline: 2
briefing: >
  You're departing KGNV at 2100 local. Destination KOJM is reporting
  800 overcast, visibility 3 in mist. Winds 270 at 10. Filed for 6,000.
  Expect ILS runway 28 approach at KOJM.

baseline_events:
  # ── Preflight: ATIS → Clearance → Ground ──
  - trigger: "phase_change:preflight"
    type: atc_instruction
    payload:
      narration_key: narration.listen_atis
      variables:
        atis_frequency: "124.15"
      atc_text_key: atc.atis_report
      variables:
        airport: "Gainesville"
        atis_letter: "Bravo"
        time: "2045"
        wind: "two seven zero at one zero"
        visibility: "three"
        sky_condition: "Eight hundred overcast"
        temperature: "22"
        dewpoint: "20"
        altimeter: "29.97"
        remarks: "IFR conditions reported at destination. "
        runway: "28"
      required_response_type: text_input
      correct_readback_keywords: ["information", "bravo"]
      coaching_key: coaching.readback_atis

  - trigger: "phase_change:preflight"
    type: atc_instruction
    payload:
      narration_key: narration.contact_clearance
      variables:
        clearance_frequency: "121.4"
      atc_text_key: atc.clearance_delivery_ifr
      variables:
        destination: "KOJM"
        route: "radar vectors MERIT DRBIE direct"
        altitude: "3,000"
        expect_altitude: "6,000"
        departure_frequency: "124.55"
        squawk: "4231"
      required_response_type: text_input
      correct_readback_keywords: ["cleared", "KOJM", "3000", "6000", "124.55", "4231"]
      coaching_key: coaching.readback_clearance_craft

  # ── Taxi ──
  - trigger: "phase_change:taxi"
    type: atc_instruction
    payload:
      narration_key: narration.contact_ground_ifr
      variables:
        ground_frequency: "121.9"
        runway: "28"
      atc_text_key: atc.ground_taxi
      variables:
        runway: "28"
        taxi_route: "Alpha, Bravo"
      required_response_type: text_input
      correct_readback_keywords: ["runway", "28", "alpha", "bravo"]
      coaching_key: coaching.readback_taxi

  # ── Departure ──
  - trigger: "phase_change:departure"
    type: atc_instruction
    payload:
      atc_text_key: atc.cleared_takeoff_hdg_alt
      variables:
        runway: "28"
        heading: "280"
        altitude: "3,000"
      required_response_type: text_input
      correct_readback_keywords: ["cleared", "takeoff", "runway", "28", "heading", "280", "3000"]
      coaching_key: coaching.readback_runway_heading_altitude_atc

  - trigger: "altitude_crossing:3000"
    type: atc_instruction
    payload:
      atc_text_key: atc.contact_departure
      variables:
        frequency: "124.55"
      required_response_type: text_input
      correct_readback_keywords: ["124.55", "departure"]
      coaching_key: coaching.readback_frequency

  - trigger: "altitude_crossing:6000"
    type: atc_instruction
    payload:
      atc_text_key: atc.maintain_altitude_expect
      variables:
        altitude: "6,000"
        approach: "ILS runway 28"
        destination: "KOJM"
      required_response_type: text_input
      correct_readback_keywords: ["maintain", "6000", "ILS", "28"]
      coaching_key: coaching.readback_altitude_approach

  - trigger: "waypoint:DRBIE"
    type: atc_instruction
    payload:
      atc_text_key: atc.descend_maintain
      variables:
        altitude: "3,000"
        approach: "ILS 28"
      required_response_type: text_input
      correct_readback_keywords: ["descend", "maintain", "3000", "ILS", "28"]
      coaching_key: coaching.readback_descent_confirm

difficulty_pools:
  "2":
    - weight: 0.4
      trigger: "waypoint:DRBIE"
      type: environmental_change
      payload:
        narration_key: narration.ceiling_drop
        variables:
          destination: "KOJM"
          ceiling: "500 overcast"
          visibility: "2"
          conditions: "mist"
        change: ceiling_drop
        new_ceiling: 500

  "3":
    - weight: 0.6
      trigger: "waypoint:MERIT"
      type: abnormal
      payload:
        title: "Pitot Heat Advisory"
        narration_key: narration.pitot_ice_fluctuation
        decision_points:
          - prompt: "What's your first action?"
            options:
              - text: "Turn on pitot heat and monitor airspeed"
                quality: best
              - text: "Continue monitoring, it's probably nothing"
                quality: poor
              - text: "Declare emergency and request immediate vectors"
                quality: acceptable
              - text: "Ignore it, autopilot has the aircraft"
                quality: dangerous
        coaching_key: coaching.pitot_heat

  "4":
    - weight: 0.8
      trigger: "time:60"
      type: emergency
      payload:
        title: "Vacuum System Failure"
        narration_key: narration.vacuum_failure
        checklist_id: vacuum_failure
        decision_points:
          - prompt: "Partial panel in IMC. What's your scan priority?"
            options:
              - text: "Transition to partial panel scan: airspeed, turn coordinator, altimeter"
                quality: best
              - text: "Trust the attitude indicator, it might recover"
                quality: dangerous
              - text: "Declare emergency and request vectors to nearest VFR"
                quality: acceptable
              - text: "Engage autopilot and hope for the best"
                quality: poor
        coaching_key: coaching.vacuum_failure
